version: "4.6"

services:
  redis:
    image: redis:7
    container_name: signagewala-redis
    restart: always
    command: >
      redis-server 
      --appendonly yes
      --bind 0.0.0.0
      --requirepass admin123
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/signagewala-redis-data

volumes:
  redis-data:

  
